version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nanoprym-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nanoprym-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  # Evolution sandbox — only started on-demand via sandbox.manager.ts
  # Do NOT start with `docker compose up` — managed programmatically
  sandbox:
    build:
      context: .
      target: sandbox
    container_name: nanoprym-sandbox
    profiles: ["evolution"]  # Only starts with --profile evolution
    network_mode: "none"     # No network access
    mem_limit: 2g
    cpus: 2
    read_only: true
    tmpfs:
      - /tmp:rw,size=512m
    environment:
      - NANOPRYM_SANDBOX=true

volumes:
  qdrant_data:
  redis_data:
